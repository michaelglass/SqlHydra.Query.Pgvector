name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    uses: michaelglass/MichaelsWackyFsPackageTools/.github/workflows/michaels-wacky-build.yml@main
    with:
      solution: SqlHydra.Query.Pgvector.slnx
      fantomas-paths: "src/ tests/ examples/"
      paket-restore: true
    permissions:
      contents: read
      checks: write
      pull-requests: write
